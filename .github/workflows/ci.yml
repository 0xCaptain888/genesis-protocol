name: Genesis Protocol CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 skills/genesis/scripts/ --max-line-length=120 --ignore=E501,W503

  python-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Run tests
        run: python -m pytest tests/ -v

  solidity-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: foundry-rs/foundry-toolchain@v1
      - name: Install dependencies
        working-directory: contracts
        run: |
          forge install Uniswap/v4-core --no-git
          forge install foundry-rs/forge-std --no-git
      - name: Build
        working-directory: contracts
        run: forge build
      - name: Test
        working-directory: contracts
        run: forge test -vv
