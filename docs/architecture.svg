<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <!-- GRADIENTS -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1224"/>
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="grayGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6b7280" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#4b5563" stop-opacity="0.06"/>
    </linearGradient>
    <linearGradient id="hookGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f0ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0.12"/>
    </linearGradient>
    <!-- GLOW FILTERS -->
    <filter id="glowCyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glowPurple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softShadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <!-- ARROW MARKER -->
    <marker id="arrowCyan" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00f0ff" opacity="0.7"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a855f7" opacity="0.7"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#9ca3af" opacity="0.7"/>
    </marker>
  </defs>

  <!-- BACKGROUND -->
  <rect width="1200" height="800" fill="url(#bgGrad)"/>
  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#00f0ff" stroke-width="0.5">
    <!-- vertical lines -->
    <line x1="100" y1="0" x2="100" y2="800"/><line x1="200" y1="0" x2="200" y2="800"/>
    <line x1="300" y1="0" x2="300" y2="800"/><line x1="400" y1="0" x2="400" y2="800"/>
    <line x1="500" y1="0" x2="500" y2="800"/><line x1="600" y1="0" x2="600" y2="800"/>
    <line x1="700" y1="0" x2="700" y2="800"/><line x1="800" y1="0" x2="800" y2="800"/>
    <line x1="900" y1="0" x2="900" y2="800"/><line x1="1000" y1="0" x2="1000" y2="800"/>
    <line x1="1100" y1="0" x2="1100" y2="800"/>
    <!-- horizontal lines -->
    <line x1="0" y1="100" x2="1200" y2="100"/><line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/><line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/><line x1="0" y1="600" x2="1200" y2="600"/>
    <line x1="0" y1="700" x2="1200" y2="700"/>
  </g>

  <!-- TITLE -->
  <text x="600" y="38" text-anchor="middle" fill="#00f0ff" font-size="22" font-weight="700" letter-spacing="3" filter="url(#glowCyan)">GENESIS PROTOCOL ARCHITECTURE</text>
  <line x1="340" y1="48" x2="860" y2="48" stroke="#00f0ff" stroke-opacity="0.25" stroke-width="1"/>

  <!-- ============================================================ -->
  <!-- LAYER 1: AI AGENT LAYER (y: 62 - 280) -->
  <!-- ============================================================ -->
  <g id="ai-layer">
    <!-- Layer container -->
    <rect x="40" y="62" width="1120" height="218" rx="12" fill="url(#purpleGrad)" stroke="#a855f7" stroke-opacity="0.35" stroke-width="1"/>
    <text x="56" y="82" fill="#a855f7" font-size="10" font-weight="600" letter-spacing="2" opacity="0.8">AI AGENT LAYER</text>

    <!-- 5-Layer Cognitive Cycle row -->
    <text x="600" y="102" text-anchor="middle" fill="#c4b5fd" font-size="10" letter-spacing="1" opacity="0.7">5-LAYER COGNITIVE CYCLE</text>

    <!-- Perception -->
    <rect x="76" y="112" width="150" height="38" rx="8" fill="#7c3aed" fill-opacity="0.15" stroke="#a855f7" stroke-opacity="0.5" stroke-width="1"/>
    <text x="151" y="136" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Perception</text>
    <!-- Arrow -->
    <line x1="230" y1="131" x2="268" y2="131" stroke="#a855f7" stroke-opacity="0.5" stroke-width="1.2" marker-end="url(#arrowPurple)"/>

    <!-- Analysis -->
    <rect x="280" y="112" width="150" height="38" rx="8" fill="#7c3aed" fill-opacity="0.15" stroke="#a855f7" stroke-opacity="0.5" stroke-width="1"/>
    <text x="355" y="136" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Analysis</text>
    <line x1="434" y1="131" x2="472" y2="131" stroke="#a855f7" stroke-opacity="0.5" stroke-width="1.2" marker-end="url(#arrowPurple)"/>

    <!-- Planning -->
    <rect x="484" y="112" width="150" height="38" rx="8" fill="#7c3aed" fill-opacity="0.15" stroke="#a855f7" stroke-opacity="0.5" stroke-width="1"/>
    <text x="559" y="136" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Planning</text>
    <line x1="638" y1="131" x2="676" y2="131" stroke="#a855f7" stroke-opacity="0.5" stroke-width="1.2" marker-end="url(#arrowPurple)"/>

    <!-- Evolution -->
    <rect x="688" y="112" width="150" height="38" rx="8" fill="#7c3aed" fill-opacity="0.15" stroke="#a855f7" stroke-opacity="0.5" stroke-width="1"/>
    <text x="763" y="136" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Evolution</text>
    <line x1="842" y1="131" x2="880" y2="131" stroke="#a855f7" stroke-opacity="0.5" stroke-width="1.2" marker-end="url(#arrowPurple)"/>

    <!-- Meta-Cognition -->
    <rect x="892" y="112" width="168" height="38" rx="8" fill="#7c3aed" fill-opacity="0.15" stroke="#a855f7" stroke-opacity="0.5" stroke-width="1"/>
    <text x="976" y="136" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Meta-Cognition</text>

    <!-- Multi-Agent row -->
    <text x="108" y="178" fill="#c4b5fd" font-size="10" letter-spacing="1" opacity="0.7">MULTI-AGENT SYSTEM</text>

    <!-- Sentinel Agent -->
    <rect x="76" y="190" width="175" height="38" rx="8" fill="#a855f7" fill-opacity="0.12" stroke="#a855f7" stroke-opacity="0.4" stroke-width="1" filter="url(#softShadow)"/>
    <circle cx="94" cy="209" r="5" fill="#a855f7" opacity="0.6"/>
    <text x="106" y="214" fill="#e9d5ff" font-size="12" font-weight="500">Sentinel Agent</text>

    <!-- Strategy Agent -->
    <rect x="268" y="190" width="175" height="38" rx="8" fill="#a855f7" fill-opacity="0.12" stroke="#a855f7" stroke-opacity="0.4" stroke-width="1" filter="url(#softShadow)"/>
    <circle cx="286" cy="209" r="5" fill="#a855f7" opacity="0.6"/>
    <text x="298" y="214" fill="#e9d5ff" font-size="12" font-weight="500">Strategy Agent</text>

    <!-- Income Agent -->
    <rect x="460" y="190" width="175" height="38" rx="8" fill="#a855f7" fill-opacity="0.12" stroke="#a855f7" stroke-opacity="0.4" stroke-width="1" filter="url(#softShadow)"/>
    <circle cx="478" cy="209" r="5" fill="#a855f7" opacity="0.6"/>
    <text x="490" y="214" fill="#e9d5ff" font-size="12" font-weight="500">Income Agent</text>

    <!-- Rebalance Agent -->
    <rect x="652" y="190" width="175" height="38" rx="8" fill="#a855f7" fill-opacity="0.12" stroke="#a855f7" stroke-opacity="0.4" stroke-width="1" filter="url(#softShadow)"/>
    <circle cx="670" cy="209" r="5" fill="#a855f7" opacity="0.6"/>
    <text x="682" y="214" fill="#e9d5ff" font-size="12" font-weight="500">Rebalance Agent</text>

    <!-- Decision Journal -->
    <rect x="860" y="182" width="175" height="52" rx="8" fill="#7c3aed" fill-opacity="0.1" stroke="#a855f7" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="4 2"/>
    <text x="947" y="204" text-anchor="middle" fill="#c4b5fd" font-size="10" letter-spacing="0.5" opacity="0.6">DECISION</text>
    <text x="947" y="220" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">Journal</text>
    <!-- connecting dashes from agents to journal -->
    <line x1="831" y1="209" x2="856" y2="209" stroke="#a855f7" stroke-opacity="0.25" stroke-width="1" stroke-dasharray="3 2"/>
  </g>

  <!-- ============================================================ -->
  <!-- DATA FLOW ARROWS: AI → Smart Contract -->
  <!-- ============================================================ -->
  <g id="flow-ai-sc">
    <line x1="300" y1="282" x2="300" y2="310" stroke="#a855f7" stroke-opacity="0.4" stroke-width="1.2" marker-end="url(#arrowPurple)"/>
    <line x1="600" y1="282" x2="600" y2="310" stroke="#00f0ff" stroke-opacity="0.4" stroke-width="1.2" marker-end="url(#arrowCyan)"/>
    <line x1="900" y1="282" x2="900" y2="310" stroke="#a855f7" stroke-opacity="0.4" stroke-width="1.2" marker-end="url(#arrowPurple)"/>
    <text x="600" y="300" text-anchor="middle" fill="#64748b" font-size="8" letter-spacing="1">DECISIONS &amp; PARAMETERS</text>
  </g>

  <!-- ============================================================ -->
  <!-- LAYER 2: SMART CONTRACT LAYER (y: 318 - 548) -->
  <!-- ============================================================ -->
  <g id="sc-layer">
    <!-- Layer container -->
    <rect x="40" y="318" width="1120" height="230" rx="12" fill="url(#cyanGrad)" stroke="#00f0ff" stroke-opacity="0.25" stroke-width="1"/>
    <text x="56" y="338" fill="#00f0ff" font-size="10" font-weight="600" letter-spacing="2" opacity="0.8">SMART CONTRACT LAYER</text>

    <!-- GenesisHookAssembler (center, large) -->
    <rect x="320" y="352" width="360" height="64" rx="10" fill="url(#hookGrad)" stroke="#00f0ff" stroke-opacity="0.6" stroke-width="1.5" filter="url(#glowCyan)"/>
    <text x="500" y="380" text-anchor="middle" fill="#00f0ff" font-size="15" font-weight="700" letter-spacing="0.5">GenesisHookAssembler</text>
    <text x="500" y="400" text-anchor="middle" fill="#67e8f9" font-size="10" opacity="0.7">Core Orchestrator</text>

    <!-- Three modules row -->
    <!-- DynamicFeeModule -->
    <rect x="76" y="438" width="220" height="44" rx="8" fill="#0ea5e9" fill-opacity="0.1" stroke="#0ea5e9" stroke-opacity="0.4" stroke-width="1"/>
    <text x="186" y="465" text-anchor="middle" fill="#7dd3fc" font-size="11.5" font-weight="600">DynamicFeeModule</text>
    <!-- connector to assembler -->
    <line x1="186" y1="438" x2="400" y2="418" stroke="#0ea5e9" stroke-opacity="0.3" stroke-width="1"/>

    <!-- MEVProtectionModule -->
    <rect x="320" y="438" width="220" height="44" rx="8" fill="#0ea5e9" fill-opacity="0.1" stroke="#0ea5e9" stroke-opacity="0.4" stroke-width="1"/>
    <text x="430" y="465" text-anchor="middle" fill="#7dd3fc" font-size="11.5" font-weight="600">MEVProtectionModule</text>
    <line x1="430" y1="438" x2="470" y2="418" stroke="#0ea5e9" stroke-opacity="0.3" stroke-width="1"/>

    <!-- AutoRebalanceModule -->
    <rect x="564" y="438" width="226" height="44" rx="8" fill="#0ea5e9" fill-opacity="0.1" stroke="#0ea5e9" stroke-opacity="0.4" stroke-width="1"/>
    <text x="677" y="465" text-anchor="middle" fill="#7dd3fc" font-size="11.5" font-weight="600">AutoRebalanceModule</text>
    <line x1="677" y1="438" x2="570" y2="418" stroke="#0ea5e9" stroke-opacity="0.3" stroke-width="1"/>

    <!-- StrategyNFT -->
    <rect x="830" y="352" width="186" height="50" rx="8" fill="#7c3aed" fill-opacity="0.1" stroke="#a855f7" stroke-opacity="0.35" stroke-width="1"/>
    <text x="923" y="375" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="600">StrategyNFT</text>
    <text x="923" y="391" text-anchor="middle" fill="#a78bfa" font-size="9" opacity="0.7">ERC-721</text>
    <!-- connector -->
    <line x1="826" y1="377" x2="684" y2="377" stroke="#a855f7" stroke-opacity="0.2" stroke-width="1" stroke-dasharray="4 2"/>

    <!-- GenesisV4Hook → Uniswap V4 PoolManager -->
    <rect x="830" y="438" width="186" height="44" rx="8" fill="#00f0ff" fill-opacity="0.08" stroke="#00f0ff" stroke-opacity="0.35" stroke-width="1"/>
    <text x="923" y="458" text-anchor="middle" fill="#67e8f9" font-size="11" font-weight="600">GenesisV4Hook</text>
    <text x="923" y="472" text-anchor="middle" fill="#22d3ee" font-size="8.5" opacity="0.6">→ Uniswap V4 PoolManager</text>
    <!-- connector up -->
    <line x1="923" y1="438" x2="923" y2="406" stroke="#00f0ff" stroke-opacity="0.25" stroke-width="1"/>

    <!-- Label: modules connection text -->
    <text x="430" y="428" text-anchor="middle" fill="#475569" font-size="8" letter-spacing="0.5">PLUGGABLE MODULES</text>

    <!-- Horizontal line separating assembler from modules -->
    <line x1="100" y1="430" x2="780" y2="430" stroke="#0ea5e9" stroke-opacity="0.1" stroke-width="0.5" stroke-dasharray="2 3"/>
  </g>

  <!-- ============================================================ -->
  <!-- DATA FLOW ARROWS: Smart Contract → Infrastructure -->
  <!-- ============================================================ -->
  <g id="flow-sc-infra">
    <line x1="300" y1="550" x2="300" y2="578" stroke="#00f0ff" stroke-opacity="0.4" stroke-width="1.2" marker-end="url(#arrowCyan)"/>
    <line x1="600" y1="550" x2="600" y2="578" stroke="#9ca3af" stroke-opacity="0.4" stroke-width="1.2" marker-end="url(#arrowGray)"/>
    <line x1="900" y1="550" x2="900" y2="578" stroke="#00f0ff" stroke-opacity="0.4" stroke-width="1.2" marker-end="url(#arrowCyan)"/>
    <text x="600" y="566" text-anchor="middle" fill="#64748b" font-size="8" letter-spacing="1">TRANSACTIONS &amp; STATE</text>
  </g>

  <!-- ============================================================ -->
  <!-- LAYER 3: INFRASTRUCTURE LAYER (y: 586 - 762) -->
  <!-- ============================================================ -->
  <g id="infra-layer">
    <rect x="40" y="586" width="1120" height="176" rx="12" fill="url(#grayGrad)" stroke="#6b7280" stroke-opacity="0.25" stroke-width="1"/>
    <text x="56" y="606" fill="#9ca3af" font-size="10" font-weight="600" letter-spacing="2" opacity="0.8">INFRASTRUCTURE LAYER</text>

    <!-- X Layer (Chain 196) -->
    <rect x="76" y="622" width="230" height="56" rx="8" fill="#374151" fill-opacity="0.3" stroke="#6b7280" stroke-opacity="0.4" stroke-width="1"/>
    <text x="191" y="648" text-anchor="middle" fill="#d1d5db" font-size="13" font-weight="600">X Layer</text>
    <text x="191" y="666" text-anchor="middle" fill="#9ca3af" font-size="10" opacity="0.7">Chain 196</text>

    <!-- OnchainOS -->
    <rect x="330" y="622" width="230" height="56" rx="8" fill="#374151" fill-opacity="0.3" stroke="#6b7280" stroke-opacity="0.4" stroke-width="1"/>
    <text x="445" y="648" text-anchor="middle" fill="#d1d5db" font-size="13" font-weight="600">OnchainOS</text>
    <text x="445" y="666" text-anchor="middle" fill="#9ca3af" font-size="10" opacity="0.7">5 Smart Wallets</text>

    <!-- OKX DEX API -->
    <rect x="584" y="622" width="230" height="56" rx="8" fill="#374151" fill-opacity="0.3" stroke="#6b7280" stroke-opacity="0.4" stroke-width="1"/>
    <text x="699" y="648" text-anchor="middle" fill="#d1d5db" font-size="13" font-weight="600">OKX DEX API</text>
    <text x="699" y="666" text-anchor="middle" fill="#9ca3af" font-size="10" opacity="0.7">Liquidity &amp; Pricing</text>

    <!-- x402 Payment Protocol -->
    <rect x="838" y="622" width="230" height="56" rx="8" fill="#374151" fill-opacity="0.3" stroke="#6b7280" stroke-opacity="0.4" stroke-width="1"/>
    <text x="953" y="648" text-anchor="middle" fill="#d1d5db" font-size="13" font-weight="600">x402 Payment Protocol</text>
    <text x="953" y="666" text-anchor="middle" fill="#9ca3af" font-size="10" opacity="0.7">Micropayments</text>

    <!-- Interconnect line -->
    <line x1="100" y1="700" x2="1040" y2="700" stroke="#6b7280" stroke-opacity="0.15" stroke-width="0.5"/>
    <!-- Small connection dots between infra components -->
    <line x1="310" y1="650" x2="326" y2="650" stroke="#6b7280" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="564" y1="650" x2="580" y2="650" stroke="#6b7280" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="2 2"/>
    <line x1="818" y1="650" x2="834" y2="650" stroke="#6b7280" stroke-opacity="0.3" stroke-width="1" stroke-dasharray="2 2"/>

    <!-- Bottom label -->
    <text x="600" y="730" text-anchor="middle" fill="#475569" font-size="9" letter-spacing="1.5">BUILT FOR OKX HACKATHON 2025</text>
    <text x="600" y="748" text-anchor="middle" fill="#334155" font-size="8" letter-spacing="1">AI-DRIVEN LIQUIDITY MANAGEMENT ON UNISWAP V4</text>
  </g>

  <!-- ============================================================ -->
  <!-- DECORATIVE ELEMENTS -->
  <!-- ============================================================ -->
  <!-- Corner accents -->
  <line x1="40" y1="62" x2="40" y2="72" stroke="#a855f7" stroke-opacity="0.5" stroke-width="2"/>
  <line x1="40" y1="62" x2="50" y2="62" stroke="#a855f7" stroke-opacity="0.5" stroke-width="2"/>
  <line x1="1160" y1="62" x2="1160" y2="72" stroke="#a855f7" stroke-opacity="0.5" stroke-width="2"/>
  <line x1="1150" y1="62" x2="1160" y2="62" stroke="#a855f7" stroke-opacity="0.5" stroke-width="2"/>

  <line x1="40" y1="762" x2="40" y2="752" stroke="#6b7280" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="40" y1="762" x2="50" y2="762" stroke="#6b7280" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="1160" y1="762" x2="1160" y2="752" stroke="#6b7280" stroke-opacity="0.4" stroke-width="2"/>
  <line x1="1150" y1="762" x2="1160" y2="762" stroke="#6b7280" stroke-opacity="0.4" stroke-width="2"/>

  <!-- Side layer labels (vertical) -->
  <text x="24" y="190" fill="#a855f7" font-size="9" opacity="0.3" transform="rotate(-90 24 190)" letter-spacing="2">AGENTS</text>
  <text x="24" y="450" fill="#00f0ff" font-size="9" opacity="0.3" transform="rotate(-90 24 450)" letter-spacing="2">CONTRACTS</text>
  <text x="24" y="680" fill="#6b7280" font-size="9" opacity="0.3" transform="rotate(-90 24 680)" letter-spacing="2">INFRA</text>

  <!-- Version badge -->
  <rect x="1080" y="10" width="55" height="20" rx="10" fill="#00f0ff" fill-opacity="0.1" stroke="#00f0ff" stroke-opacity="0.3" stroke-width="0.5"/>
  <text x="1107" y="24" text-anchor="middle" fill="#00f0ff" font-size="9" opacity="0.7">v1.0</text>
</svg>