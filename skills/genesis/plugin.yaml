name: genesis
version: 0.1.0
description: >
  AI-powered Uniswap V4 Hook strategy engine for X Layer.
  Autonomously generates, deploys, and manages composable Hook strategies
  with dynamic fees, MEV protection, and auto-rebalancing.
  Proven strategies are minted as on-chain Strategy NFTs.
author: Genesis Protocol
license: MIT
homepage: https://github.com/genesis-protocol/genesis
tags:
  - defi
  - uniswap-v4
  - hooks
  - x-layer
  - strategy
  - nft
  - x402
  - ai-agent

platforms:
  - claude-code
  - cursor
  - openclaw

dependencies:
  required:
    - onchainos-wallet
    - onchainos-trade
    - onchainos-market
  optional:
    - onchainos-payment
    - uniswap-hooks
    - uniswap-trading

chain:
  id: 196
  name: xlayer
  rpc: https://rpc.xlayer.tech

entry_point: scripts/main.py
skill_file: SKILL.md

safety:
  default_paused: true
  default_mode: paper
  default_dry_run: true
  requires_explicit_enable: true

x402:
  enabled: true
  services:
    - name: signal_query
      amount: "0.001"
      token: USDT
    - name: strategy_subscribe
      amount: "0.01"
      token: USDT
    - name: strategy_params_buy
      amount: "1.00"
      token: USDT
    - name: nft_license
      amount: "5.00"
      token: USDT
